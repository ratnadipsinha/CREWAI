name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
        env:
          # Your backend URL is injected here from a repo VARIABLE (not committed),
          # so the public repo never hardcodes it. Set it at:
          # Settings → Secrets and variables → Actions → Variables → VITE_BACKEND_URL
          VITE_BACKEND_URL: ${{ vars.VITE_BACKEND_URL }}
          # Shared token so the deployed frontend can call the protected backend.
          # Set at: Settings → Secrets and variables → Actions → Variables → VITE_BACKEND_TOKEN
          VITE_BACKEND_TOKEN: ${{ vars.VITE_BACKEND_TOKEN }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: code/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
